# XiuXian Configuration

# ===== Lingqi Calculation =====
interval-seconds: 15
formula: "{base} + {level} * {coeff}"
base-lingqi: 1
lingqi-coefficient: 0.1
min-lingqi: 1

# ===== XP Formula =====
xp-base: 128
xp-rate: 1.014

# ===== Attribute System =====
attr-hp-per-level: 0.05
attr-armor-per-level: 0.005
attr-attack-per-level: 0.005
attr-chong-hp: 150
attr-chong-armor: 30
attr-chong-attack: 30
attr-realm-hp: 1500
attr-realm-armor: 300
attr-realm-attack: 300

# ===== Mana System =====
mana-per-level: 2
mana-recovery: 0.5
mana-chong-bonus: 50
mana-realm-bonus: 500

# ===== Island Settings =====
island-world: oneblock_world
island-range: 200
level-cooldown: 120

# ===== Realm System =====
realm-levels: 100
chong-levels: 10

lian-ti-realms:
  - 通脉
  - 锻骨
  - 练腑
  - 元武
  - 神力
  - 破虚
  - 混元
  - 大成
  - 涅槃
  - 真武
  - 金相
  - 太上
  - 罗天

fa-xiu-realms:
  - 练气
  - 筑基
  - 结丹
  - 元婴
  - 化神
  - 返虚
  - 合体
  - 大乘
  - 渡劫
  - 真仙
  - 金仙
  - 太乙
  - 大罗

# ===== Display Format =====
lingqi-message: "&a+{amount} &b{type}"
lianti-name: "&a炼体修为"
xiufa-name: "&b法修修为"
breakthrough-message: "&e{player} &7当前境界提升"
zero-level-name: 凡人之躯
max-level-suffix: ·圆满
